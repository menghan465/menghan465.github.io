name: Deploy Hugo site to Pages

# 触发条件：推送到 main 分支，或手动触发
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 权限设置，允许读取内容和写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制并发部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # 构建阶段
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须开启递归，否则无法拉取主题文件
          fetch-depth: 0        # 获取完整历史以确保 .GitInfo 等变量正常工作

      - name: Setup Hugo CLI
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true        # 必须开启 extended 以支持 SCSS 等编译

      - name: Build site with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify      # 编译并压缩产物

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public        # Hugo 默认输出目录

  # 部署阶段
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4